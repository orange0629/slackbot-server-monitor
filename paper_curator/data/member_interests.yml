# Hand-curated research focuses, keyed by member name EXACTLY as it appears
# on the lab website (matches profiles_cache.json -> members[].name).
#
# Each member's value is a LIST of themed lines. Each line becomes its own
# query vector in the bi-encoder, so a paper that strongly matches one theme
# keeps its full cosine score (not diluted by averaging across all themes).
# The LLM judge sees the same lines verbatim in the MEMBERS prompt block.
#
# Tips:
#   - Each line should be ONE coherent theme: a tight cluster of related
#     terms describing one research direction. 3-7 themes per person works
#     well; more = diminishing returns.
#   - Be concrete. "Multilingual moral reasoning in code-mixed Hindi-English
#     dialogue" beats "NLP".
#   - Method + topic + application makes a strong signal. e.g.
#     "Bayesian models of social network formation in online polarization"
#   - Include negatives if useful (LLM reads them):
#     "Not interested in pure-vision or multimodal-only papers"
#
# Names not listed here are unaffected (bio + publications still drive
# ranking). Names that don't match a scraped member are silently ignored.
#
# After editing, refresh & re-embed:
#     python -m paper_curator.cli --refresh-profiles --print-profiles

